# Project Forge — Role Definitions
# Format:
#   role: <name>
#   privileges: <PRIV1>, <PRIV2>, ...
#
# Available privileges:
#   VIEW_OWN         — view own assigned tasks
#   VIEW_PROJECT     — view full project (tasks, schedule, Gantt)
#   VIEW_PORTFOLIO   — view all projects across the company
#   EDIT_TASK        — create, edit, remove tasks
#   EDIT_DEPS        — add and remove task dependencies
#   ASSIGN           — assign team members to tasks
#   SCHEDULE         — run scheduling algorithms (CPM, risk-weighted)
#   REPORT           — access reports and exports (Gantt, DAG, .dot)
#   ADMIN            — system-level operations (create projects, manage roles)
#
# Note: System Admin is always injected at startup with all privileges.
#       Do not define it here.

role: Executive
privileges: VIEW_PORTFOLIO, REPORT

role: Project Manager
privileges: VIEW_PROJECT, EDIT_TASK, EDIT_DEPS, ASSIGN, SCHEDULE, REPORT

role: Team Lead
privileges: VIEW_PROJECT, EDIT_TASK, EDIT_DEPS, ASSIGN, SCHEDULE

role: Developer
privileges: VIEW_OWN, VIEW_PROJECT

role: Stakeholder
privileges: VIEW_PORTFOLIO, REPORT
